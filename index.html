<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Caravan - Oakville</title>
    <!-- Premium Google Fonts matching the image precisely -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    
    <style>
        /* Base Reset & Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #1a110b; 
            color: #ffffff; 
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* Fixed Navigation Bar Styling */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 6%;
            background-color: #2b1d12; /* Warm dark brown header background from image */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #dfb76c;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        nav {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        nav a {
            color: #e6ded7;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #dfb76c;
        }
        .nav-btn {
            background-color: #dfb76c;
            color: #1a110b;
            padding: 10px 22px;
            border-radius: 4px;
            font-weight: 600;
            transition: background-color 0.3s;
            text-decoration: none;
        }
        .nav-btn:hover {
            background-color: #cda255;
        }

        /* Hero Splash Banner Section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 80px 6% 0 6%;
            background: linear-gradient(rgba(26, 17, 11, 0.75), rgba(26, 17, 11, 0.75)), 
                        url('https://unsplash.com');
            background-size: cover;
            background-position: center;
        }
        .hero-content { max-width: 650px; z-index: 2; }
        .badge {
            display: inline-flex;
            align-items: center;
            background-color: rgba(223, 183, 108, 0.15);
            color: #dfb76c;
            border: 1px solid rgba(223, 183, 108, 0.3);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }
        .hero-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            line-height: 1.15;
            color: #ffffff;
            margin-bottom: 20px;
        }
        .hero-content p { font-size: 1.1rem; color: #cbbcb0; margin-bottom: 35px; }
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .btn-primary {
            background-color: #dfb76c;
            color: #1a110b;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.3s;
        }
        .btn-primary:hover { background-color: #cda255; }
        .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        .btn-secondary:hover { background-color: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.6); }

        /* Menu Display Elements */
        .menu-section { padding: 100px 6%; background-color: #130c08; }
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h3 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: #dfb76c; margin-bottom: 10px; }
        .section-header p { color: #cbbcb0; font-size: 1rem; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .menu-card { background-color: #1a110b; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px; overflow: hidden; transition: transform 0.3s, border-color 0.3s; }
        .menu-card:hover { transform: translateY(-5px); border-color: #dfb76c; }
        .menu-img-container { height: 220px; width: 100%; overflow: hidden; background-color: #221811; }
        .menu-img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .menu-card:hover .menu-img-container img { transform: scale(1.05); }
        .menu-details { padding: 25px; }
        .menu-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #ffffff; margin-bottom: 8px; }
        .menu-description { color: #cbbcb0; font-size: 0.9rem; line-height: 1.5; }

        /* ------------------------------------------------------------------
           EXACT ABOUT US SECTION LAYOUT
        ------------------------------------------------------------------ */
        .about-section {
            background-color: #f6efe2; /* Light cream tone from your background reference */
            color: #483d35;           /* Authentic dark brown copy color text */
            padding: 120px 8%;
        }
        .about-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.05fr 1.35fr;
            gap: 70px;
            align-items: center;
        }
        @media (max-width: 960px) {
            .about-container { grid-template-columns: 1fr; gap: 50px; }
        }
        
        /* Layout Component: Image Wrap & Corner Floating Badge */
        .about-image-wrapper {
            position: relative;
            width: 100%;
        }
        .about-main-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 16px; /* Rounded image frame rules */
        }
        .about-img-badge {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background-color: #261a11; /* Dark label container styling from graphic */
            color: #ffffff;
            padding: 14px 22px;
            border-radius: 6px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .badge-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #dfb76c;
            margin-bottom: 3px;
        }
        .badge-text {
            font-size: 0.85rem;
            font-weight: 400;
            color: #ece4db;
        }

        /* Layout Component: Narrative Typography Columns */
        .about-text-content {
            text-align: left;
        }
        .about-subtitle {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #bfa068; /* Golden bronze tracking color element */
            margin-bottom: 12px;
            display: block;
        }
        .about-text-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            line-height: 1.2;
            color: #281d15;
            margin-bottom: 35px;
            font-weight: 600;
        }
        .about-text-content p {
            font-size: 1.05rem;
            line-height: 1.75;
            color: #483d35;
            margin-bottom: 25px;
            text-align: left;
            max-width: 100%;
        }
        .about-text-content p:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <!-- HEADER NAVIGATION -->
    <header>
        <div class="logo-area">
            <span class="logo-text">Golden Caravan</span>
        </div>
        <nav>
            <a href="#menu">Menu</a>
            <a href="#about">About</a>
            <a href="#gallery">Gallery</a>
            <a href="#reservations">Reservations</a>
            <a href="#reservations" class="nav-btn">Reserve a Table</a>
        </nav>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-content">
            <div class="badge">✦ Certified Halal - Oakville, Ontario</div>
            <h2>A Taste of the Silk Road in Oakville</h2>
            <p>Authentic Uyghur halal cuisine — hand-pulled laghman noodles, fragrant polo, golden samsa, and more. Freshly made, warmly served.</p>
            
            <div class="btn-group">
                <a href="#menu" class="btn-primary">View Our Menu <span>›</span></a>
