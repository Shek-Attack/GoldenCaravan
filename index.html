<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Caravan - Oakville</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset and Font Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #1a110b; 
            color: #ffffff; 
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* Header Navigation */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 6%;
            background-color: rgba(26, 17, 11, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #d4af37;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        nav {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        nav a {
            color: #e0d5cb;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        nav a:hover {
            color: #d4af37;
        }
        .nav-btn {
            background-color: #d4af37;
            color: #1a110b;
            padding: 10px 22px;
            border-radius: 4px;
            font-weight: 600;
            transition: background-color 0.3s ease;
            text-decoration: none;
        }
        .nav-btn:hover {
            background-color: #bd9b2d;
        }

        /* Hero Section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 80px 6% 0 6%;
            background: linear-gradient(rgba(26, 17, 11, 0.75), rgba(26, 17, 11, 0.75)), 
                        url('https://unsplash.com');
            background-size: cover;
            background-position: center;
        }
        .hero-content {
            max-width: 650px;
            z-index: 2;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            background-color: rgba(212, 175, 55, 0.15);
            color: #d4af37;
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }
        .hero-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            line-height: 1.15;
            color: #ffffff;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .hero-content p {
            font-size: 1.1rem;
            color: #cbbcb0;
            margin-bottom: 35px;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .btn-primary {
            background-color: #d4af37;
            color: #1a110b;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.3s ease;
        }
        .btn-primary:hover { background-color: #bd9b2d; }
        .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.6);
        }

        /* Menu Section Content Layout */
        .menu-section {
            padding: 100px 6%;
            background-color: #130c08;
        }
        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }
        .section-header h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #d4af37;
            margin-bottom: 10px;
        }
        .section-header p {
            color: #cbbcb0;
            font-size: 1rem;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .menu-card {
            background-color: #1a110b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .menu-card:hover {
            transform: translateY(-5px);
            border-color: #d4af37;
        }
        .menu-img-container {
            height: 220px;
            width: 100%;
            overflow: hidden;
            background-color: #221811;
        }
        .menu-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .menu-card:hover .menu-img-container img { transform: scale(1.05); }
        .menu-details { padding: 25px; }
        .menu-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: #ffffff;
            margin-bottom: 8px;
        }
        .menu-description {
            color: #cbbcb0;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* ------------------------------------------------------------------
           NEW EXACT ABOUT SECTION STYLES
        ------------------------------------------------------------------ */
        .about-section {
            background-color: #f7f3eb; /* High-end light cream background */
            color: #3e3228;           /* Rich, premium dark brown readable text */
            padding: 100px 8%;
        }
        .about-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.1fr 1.3fr;
            gap: 60px;
            align-items: center;
        }
        /* Mobile adjustment rule */
        @media (max-width: 900px) {
            .about-container { grid-template-columns: 1fr; gap: 40px; }
        }
        
        /* Left Column: Visual Presentation Media */
        .about-image-wrapper {
            position: relative;
            width: 100%;
        }
        .about-main-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }
        /* Artisanal Badge Floating over image lower corner */
        .about-img-badge {
            position: absolute;
            bottom: -15px;
            right: -15px;
            background-color: #1a110b;
            color: #ffffff;
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-left: 3px solid #d4af37;
        }
        .badge-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #d4af37;
            margin-bottom: 2px;
        }
        .badge-text {
            font-size: 0.85rem;
            font-weight: 500;
            color: #e0d5cb;
            white-space: nowrap;
        }

        /* Right Column: Narrative Copy Elements */
        .about-text-content {
            padding-left: 20px;
        }
        @media (max-width: 900px) {
            .about-text-content { padding-left: 0; }
        }
        .about-subtitle {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #bd9b2d;
            margin-bottom: 15px;
            display: block;
        }
        .about-text-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            line-height: 1.2;
            color: #1a110b;
            margin-bottom: 30px;
            font-weight: 500;
        }
        .about-text-content p {
            font-size: 1.05rem;
            line-height: 1.75;
            color: #4a3e35;
            margin-bottom: 25px;
        }
        .about-text-content p:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <!-- HEADER NAVIGATION -->
    <header>
        <div class="logo-area">
            <span class="logo-text">Golden Caravan</span>
        </div>
        <nav>
            <a href="#menu">Menu</a>
            <a href="#about">About</a>
